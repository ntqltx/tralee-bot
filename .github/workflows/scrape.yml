name: scrape site rss

on:
  schedule:
    - cron: "*/45 * * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: check out repository
        uses: actions/checkout@v4

      - name: set up python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: install dependencies
        run: python -m pip install --upgrade requests

      - name: scrape rss and push listings
        env:
          RAILWAY_BOT_URL: ${{ secrets.RAILWAY_BOT_URL }}
        run: python scraper.py
