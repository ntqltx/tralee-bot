services:
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    environment:
      LOG_LEVEL: info
      TZ: Europe/Dublin
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1g

  bot:
    build: .
    container_name: tralee-bot
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      FLARESOLVERR_URL: http://flaresolverr:8191/v1
      SEEN_PATH: /data/seen.json
      SUBS_PATH: /data/subscribers.json
      TZ: Europe/Dublin
    volumes:
      - bot-data:/data
    depends_on:
      - flaresolverr
    restart: unless-stopped

volumes:
  bot-data:
