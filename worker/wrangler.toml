# Cloudflare Worker config for the Telegram webhook receiver.
#
# One-time setup:
#   cd worker
#   wrangler kv:namespace create tralee_bot
#   # copy the printed id into the [[kv_namespaces]] block below
#   wrangler secret put BOT_TOKEN
#   wrangler deploy
#
# After deploying, point Telegram at the worker:
#   curl "https://api.telegram.org/bot<BOT_TOKEN>/setWebhook?url=https://<worker-name>.<account>.workers.dev/"

name = "tralee-bot-webhook"
main = "src/index.js"
compatibility_date = "2026-05-01"

[[kv_namespaces]]
binding = "KV"
id = "1bc0942bd1e04e4b9c9a6eecb14e7376"
